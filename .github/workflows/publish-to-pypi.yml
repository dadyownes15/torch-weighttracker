name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate distribution version
        run: |
          python - <<'PY'
          import email.parser
          import os
          import pathlib
          import sys
          import zipfile

          tag = os.environ["GITHUB_REF_NAME"]
          tag_version = tag[1:] if tag.startswith("v") else tag
          wheels = list(pathlib.Path("dist").glob("*.whl"))

          if len(wheels) != 1:
              print(f"Expected one wheel, found {len(wheels)}.", file=sys.stderr)
              sys.exit(1)

          with zipfile.ZipFile(wheels[0]) as wheel:
              metadata_path = next(
                  name
                  for name in wheel.namelist()
                  if name.endswith(".dist-info/METADATA")
              )
              metadata = email.parser.Parser().parsestr(
                  wheel.read(metadata_path).decode()
              )

          distribution_version = metadata["Version"]

          if tag_version != distribution_version:
              print(
                  f"Tag {tag!r} does not match distribution "
                  f"version {distribution_version!r}.",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/torch-weighttracker
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
